name: Build FilzaJailed Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 获取源码 (包含子模块)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 配置官方 Theos 编译环境
        uses: theos/theos-action@v1

      - name: 开始编译
        run: |
          make clean
          make FINALPACKAGE=1

      - name: 提取并上传产物
        uses: actions/upload-artifact@v4
        with:
          name: FilzaApplySandboxExt-Dylib
          path: |
            .theos/obj/**/*.dylib
            packages/**/*.deb
